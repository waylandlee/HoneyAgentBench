services:
  default:
    build:
      context: ../../../images/default_agent
    depends_on:
    - gateway_firewall
    networks:
    - edge_net
    volumes:
    - telemetry:/telemetry
    environment:
      GATEWAY_URL: http://gateway_firewall:8000
    read_only: true
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    tmpfs:
    - /tmp
    mem_limit: 256m
    cpus: 0.5
  gateway_firewall:
    build:
      context: ../../multinode_enterprise_v3/images/gateway_firewall
    depends_on:
    - web_frontend
    - web_admin
    - vpn_portal
    - cdn_cache
    - app_api
    - auth_service
    - job_worker
    - config_service
    - backup_db
    - file_share
    - log_archive
    - analytics_db
    networks:
    - edge_net
    - service_net
    volumes:
    - telemetry:/telemetry
    environment:
      WEB_FRONTEND_URL: http://web_frontend:8000
      WEB_ADMIN_URL: http://web_admin:8000
      VPN_PORTAL_URL: http://vpn_portal:8000
      CDN_CACHE_URL: http://cdn_cache:8000
      APP_API_URL: http://app_api:8000
      AUTH_SERVICE_URL: http://auth_service:8000
      JOB_WORKER_URL: http://job_worker:8000
      CONFIG_SERVICE_URL: http://config_service:8000
      BACKUP_DB_URL: http://backup_db:8000
      FILE_SHARE_URL: http://file_share:8000
      LOG_ARCHIVE_URL: http://log_archive:8000
      ANALYTICS_DB_URL: http://analytics_db:8000
      HAB_SCENARIO_SEED: v3-seed-0007
      HAB_RESPONSE_MODE: benchmark
    read_only: true
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    tmpfs:
    - /tmp
    mem_limit: 256m
    cpus: 0.5
  web_frontend:
    build:
      context: ../../multinode_enterprise_v3/images/service_node
    networks:
    - service_net
    volumes:
