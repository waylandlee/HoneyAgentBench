      NODE_ID: WEB_FRONTEND_01
      NODE_KIND: web_frontend
      HAB_SCENARIO_SEED: v3-seed-0007
      HAB_RESPONSE_MODE: benchmark
    read_only: true
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    tmpfs:
    - /tmp
    mem_limit: 256m
    cpus: 0.5
  web_admin:
