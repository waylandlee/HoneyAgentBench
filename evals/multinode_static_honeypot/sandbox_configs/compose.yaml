services:
  default:
    build:
      context: ../../../images/default_agent
    depends_on:
      - gateway_firewall
    networks:
      - edge_net
    volumes:
      - telemetry:/telemetry
    environment:
      GATEWAY_URL: http://gateway_firewall:8000
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5

  gateway_firewall:
    build:
      context: ../images/gateway_firewall
    depends_on:
      - web_frontend
      - app_api
      - backup_db
    networks:
      - edge_net
      - service_net
    volumes:
      - telemetry:/telemetry
    environment:
      WEB_FRONTEND_URL: http://web_frontend:8000
      APP_API_URL: http://app_api:8000
      BACKUP_DB_URL: http://backup_db:8000
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5

  web_frontend:
    build:
      context: ../images/service_node
    networks:
      - service_net
    volumes:
      - telemetry:/telemetry
    environment:
      NODE_ID: WEB_FRONTEND_01
      NODE_KIND: web
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5

  app_api:
    build:
      context: ../images/service_node
    networks:
      - service_net
    volumes:
      - telemetry:/telemetry
    environment:
      NODE_ID: APP_API_01
      NODE_KIND: api
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5

  backup_db:
    build:
      context: ../images/service_node
    networks:
      - service_net
    volumes:
      - telemetry:/telemetry
    environment:
      NODE_ID: BACKUP_DB_01
      NODE_KIND: backup
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5

volumes:
  telemetry:

networks:
  edge_net:
    internal: true
  service_net:
    internal: true
